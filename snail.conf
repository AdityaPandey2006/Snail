# Snail configuration file
# This file is copied to ~/snailShellrc on first run if that file does not exist.
# Strings may be written with or without quotes.
# Booleans accept true/false, yes/no, on/off, or 1/0.

[theme]
# Use hex colors like #111111
background = "#111111"
foreground = "#d4d4d4"
prompt_color = "#00ff9c"
directory_color = "#61afef"
ls_file_color = "#d4d4d4"
ls_directory_color = "#61afef"
error_color = "#ff5f56"
success_color = "#50fa7b"
rainbow_directory = false

[prompt]
# path_style options: full, home_relative, basename, shortened
path_style = "home_relative"
# separator examples: " > ", " $ ", " :: ", " lambda> "
separator = " > "
show_user = false
show_hostname = false
# false = single-line prompt, true = info line + prompt line
newline_before_prompt = true
two_line_prompt = true
show_git_branch = true
# shows the last non-zero exit status
show_exit_status = true
show_last_duration = true
show_time = true
# only show duration when it is at least this many milliseconds
duration_threshold_ms = 100

[startup]
# Add startup commands as command1, command2, command3 ... (no commas)
# Uncommented lines run automatically when Snail starts.
# Example:
command1 = "echo Welcome to Snail"
command2 = "pwd"
# command3 = "ls"

[ui]
font_family = "Consolas"
font_size = 12
window_width = 1300
window_height = 700
# Controls whether the shell prints the ASCII snail at startup.
show_snail_art = true

[shell]
clean_dump_on_start = true
clear_screen_on_start = false
